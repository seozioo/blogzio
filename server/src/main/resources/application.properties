spring.config.import=optional:file:../.env[.properties]

spring.application.name=blogzio

server.port=4000
server.forward-headers-strategy=native

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.cloud.aws.credentials.accessKey=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secretKey=${AWS_SECRET_KEY}
spring.cloud.aws.s3.endpoint=${AWS_S3_ENDPOINT}
spring.cloud.aws.s3.path-style-access-enabled=true
spring.cloud.aws.s3.region=${AWS_REGION}
spring.cloud.aws.s3.bucket=${AWS_S3_BUCKET}

server.servlet.context-path=/api

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.h2.console.enabled=false

jwt.secret=${JWT_SECRET}

visitor.secret=${VISITOR_SECRET}

springdoc.api-docs.enabled=false
